<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="VoiceMap" />
  <title>VoiceMap</title>
  <style>
    :root {
      --font:        -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --bg:          #f2f2f7;
      --surface:     #ffffff;
      --border:      rgba(0,0,0,0.10);
      --text:        #1c1c1e;
      --muted:       #6b7280;
      --accent:      #E24B4A;
      --accent-dark: #A32D2D;
      --radius:      13px;
      --safe-top:    env(safe-area-inset-top,    0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0; padding: 0;
      -webkit-tap-highlight-color: transparent;
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
    }

    /* Re-enable text selection only where typing is needed */
    input, textarea, [contenteditable] {
      -webkit-user-select: text;
      user-select: text;
    }

    html, body { height: 100%; font-family: var(--font); background: var(--bg); overflow: hidden; max-width: 100vw; }
    html { overflow-x: hidden; }

    .app { height: 100dvh; width: 100vw; max-width: 100vw; display: flex; flex-direction: column; overflow: hidden; }

    /* ── Nav bar ──────────────────────────────────────────────── */
    .nav-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: calc(var(--safe-top) + 10px) 12px 10px;
      background: var(--surface);
      border-bottom: 0.5px solid var(--border);
      flex-shrink: 0;
      min-height: 52px;
    }

    .back-btn {
      font-size: 17px;
      color: var(--accent);
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px 8px 4px 2px;
      white-space: nowrap;
      font-family: var(--font);
      visibility: hidden;
      flex-shrink: 0;
    }
    .back-btn.visible { visibility: visible; }

    .nav-title {
      flex: 1;
      font-size: 17px;
      font-weight: 600;
      color: var(--text);
      text-align: center;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* ── Menu ─────────────────────────────────────────────────── */
    .menu-wrap { position: relative; flex-shrink: 0; }

    .menu-btn {
      font-size: 22px;
      color: var(--muted);
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px 6px;
      line-height: 1;
      letter-spacing: 1px;
    }

    .menu-dropdown {
      position: absolute;
      top: calc(100% + 6px);
      right: 0;
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: var(--radius);
      box-shadow: 0 8px 28px rgba(0,0,0,0.13);
      min-width: 168px;
      overflow: hidden;
      display: none;
      z-index: 100;
    }
    .menu-dropdown.open { display: block; }

    .menu-item {
      width: 100%;
      display: block;
      padding: 13px 16px;
      font-size: 15px;
      color: var(--text);
      background: none;
      border: none;
      border-bottom: 0.5px solid var(--border);
      text-align: left;
      cursor: pointer;
      font-family: var(--font);
    }
    .menu-item:last-child { border-bottom: none; }
    .menu-item:active     { background: #f2f2f7; }
    .menu-item.danger     { color: var(--accent); }

    /* ── Card list ────────────────────────────────────────────── */
    .card-scroll {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 12px 14px 8px;
    }

    @keyframes slideFromRight { from { transform: translateX(28px); opacity: 0; } to { transform: none; opacity: 1; } }
    @keyframes slideFromLeft  { from { transform: translateX(-28px); opacity: 0; } to { transform: none; opacity: 1; } }
    #cardList.anim-forward { animation: slideFromRight 0.22s ease; }
    #cardList.anim-back    { animation: slideFromLeft  0.22s ease; }

    /* ── Swipe wrapper ────────────────────────────────────────── */
    .card-swipe-wrap {
      position: relative;
      margin-bottom: 10px;
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }

    .swipe-left-btns, .swipe-right-btns {
      position: absolute; top: 0; bottom: 0;
      display: flex; align-items: stretch;
    }
    .swipe-left-btns  { right: 0; }
    .swipe-right-btns { left: 0; }

    .swipe-btn {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 3px; width: 80px; padding: 0; border: none;
      color: white; font-size: 12px; font-weight: 600;
      font-family: var(--font); cursor: pointer;
    }
    .swipe-btn .swipe-icon { font-size: 20px; line-height: 1; }
    .swipe-btn-done   { background: #30d158; }
    .swipe-btn-refile { background: #007aff; }
    .swipe-btn-delete { background: #ff3b30; }

    /* ── Card ─────────────────────────────────────────────────── */
    .card {
      background: var(--surface);
      border-radius: var(--radius);
      border: 0.5px solid var(--border);
      overflow: hidden;
      position: relative; z-index: 2;
      transform: translateX(0);
    }
    .card.swipe-snap { transition: transform 0.22s ease; }

    .card-front {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 13px 14px;
      cursor: pointer;
      user-select: none;
    }

    .pip {
      width: 9px; height: 9px;
      border-radius: 50%;
      flex-shrink: 0;
      border: 1.5px solid;
    }
    .pip-untouched   { background: #f3f4f6; border-color: #9ca3af; }
    .pip-in-progress { background: #fef3c7; border-color: #f59e0b; }
    .pip-refined     { background: #d1fae5; border-color: #10b981; }
    .pip-locked      { background: #e0e7ff; border-color: #6366f1; }
    .pip-done        { background: #30d158; border-color: #30d158; }
    .card[data-status="done"] .card-title {
      text-decoration: line-through;
      opacity: 0.45;
    }
    .card[data-status="done"] .card-meta { opacity: 0.4; }

    .card-body   { flex: 1; min-width: 0; }
    .card-title  { font-size: 15px; font-weight: 500; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .card-meta   { font-size: 12px; color: var(--muted); margin-top: 2px; }

    .card-actions { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }

    .info-btn {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: #f2f2f7;
      border: none;
      color: var(--muted);
      font-size: 13px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .info-btn:active { background: #e5e5ea; }

    .chevron { font-size: 20px; color: #c7c7cc; font-weight: 300; line-height: 1; }

    /* Summary expand */
    .refile-btn {
      margin-top: 10px;
      width: 100%;
      padding: 8px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px;
      color: #aab;
      font-size: 13px;
      cursor: pointer;
      text-align: center;
    }
    .refile-btn:active { background: rgba(255,255,255,0.15); }
    .refile-btn.filing { color: #f5c842; }
    .card-action-row {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }
    .card-action-row .refile-btn,
    .card-action-row .simplify-btn {
      margin-top: 0;
      flex: 1;
    }
    .simplify-btn {
      padding: 8px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px;
      color: #aab;
      font-size: 13px;
      cursor: pointer;
      text-align: center;
    }
    .simplify-btn:active { background: rgba(255,255,255,0.15); }
    .simplify-btn.working { color: #f5c842; }

    /* ── Drag & drop ───────────────────────────────────────────── */
    .card-swipe-wrap.drag-source { opacity: 0.35; }
    .card-swipe-wrap.drop-child-target > .card {
      outline: 2.5px solid #30d158;
      outline-offset: -2px;
    }
    #drag-ghost {
      position: fixed;
      pointer-events: none;
      z-index: 1000;
      border-radius: var(--radius);
      box-shadow: 0 10px 36px rgba(0,0,0,0.26);
      opacity: 0.93;
      transform: scale(1.03);
      background: var(--surface);
      overflow: hidden;
      border: 0.5px solid var(--border);
    }
    #drop-indicator {
      height: 3px;
      background: var(--accent);
      border-radius: 3px;
      margin: 3px 4px;
      display: none;
    }
    #drop-indicator.visible { display: block; }

    /* ── Select / merge mode ───────────────────────────────────── */
    .card.selectable { cursor: pointer; }
    .card.selectable .card-front { padding-right: 8px; }
    .select-indicator {
      width: 22px; height: 22px; border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.3);
      flex-shrink: 0; display: flex; align-items: center; justify-content: center;
      font-size: 13px; margin-right: 10px;
    }
    .card.selected .select-indicator {
      background: #0a84ff; border-color: #0a84ff; color: white;
    }
    .merge-bar {
      position: fixed; bottom: calc(var(--safe-bottom) + 130px);
      left: 50%; transform: translateX(-50%);
      background: #0a84ff; color: white;
      border-radius: 24px; padding: 10px 24px;
      font-size: 15px; font-weight: 600;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
      display: none; gap: 16px; align-items: center;
      z-index: 200;
    }
    .merge-bar.visible { display: flex; }
    .merge-bar button {
      background: rgba(255,255,255,0.25); border: none;
      color: white; border-radius: 14px;
      padding: 4px 12px; font-size: 13px; cursor: pointer;
    }

    .card-summary-wrap {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.28s ease;
    }
    .card.expanded .card-summary-wrap { max-height: 260px; }

    .card-summary {
      padding: 10px 14px 13px 33px;
      font-size: 13px;
      color: var(--muted);
      line-height: 1.55;
      border-top: 0.5px solid var(--border);
    }

    /* ── Empty state ──────────────────────────────────────────── */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 52px 24px;
      gap: 8px;
      text-align: center;
    }
    .empty-icon { font-size: 34px; margin-bottom: 6px; }
    .empty-text { font-size: 15px; color: var(--muted); }
    .empty-hint { font-size: 13px; color: #9ca3af; }

    /* ── Record bar ───────────────────────────────────────────── */
    .record-bar {
      background: var(--surface);
      border-top: 0.5px solid var(--border);
      padding: 10px 20px calc(var(--safe-bottom) + 14px);
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .live-text {
      font-size: 13px;
      color: var(--muted);
      font-style: italic;
      min-height: 18px;
      text-align: center;
      width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .record-row { display: flex; align-items: center; justify-content: center; gap: 20px; }

    .record-btn {
      width: 64px; height: 64px;
      border-radius: 50%;
      background: var(--accent);
      border: none;
      color: white;
      font-size: 22px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 16px rgba(226,75,74,0.35);
      transition: transform 0.1s, box-shadow 0.1s, background 0.2s;
    }
    .record-btn:active:not(:disabled) { transform: scale(0.93); box-shadow: 0 2px 8px rgba(226,75,74,0.25); }
    .record-btn:disabled { background: #d1d5db; box-shadow: none; cursor: not-allowed; }
    .record-btn.recording {
      background: #1c1c1e;
      box-shadow: 0 0 0 4px rgba(226,75,74,0.25);
      animation: rec-glow 1.6s ease infinite;
    }
    @keyframes rec-glow {
      0%,100% { box-shadow: 0 0 0 4px rgba(226,75,74,0.20); }
      50%      { box-shadow: 0 0 0 8px rgba(226,75,74,0.08); }
    }

    .stop-btn {
      width: 44px; height: 44px;
      border-radius: 50%;
      background: #f2f2f7;
      border: 0.5px solid var(--border);
      color: var(--muted);
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .stop-btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .stop-btn:active:not(:disabled) { background: #e5e5ea; }

    .status-text            { font-size: 12px; color: var(--muted); text-align: center; }
    .status-text.processing { color: #f59e0b; }
    .status-text.error      { color: var(--accent); }

    /* ── Camera / image cards ─────────────────────────────────── */
    .camera-btn {
      width: 44px; height: 44px; border-radius: 50%;
      background: #f2f2f7; border: 0.5px solid var(--border);
      font-size: 20px; cursor: pointer; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s;
    }
    .camera-btn:active:not(:disabled) { background: #e5e5ea; }
    .camera-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .camera-btn.has-pending {
      background: #fff3cd; border-color: #f59e0b;
      font-size: 12px; font-weight: 600; color: #92400e;
    }

    .card-image-thumb {
      width: 48px; height: 48px; border-radius: 8px;
      object-fit: cover; flex-shrink: 0;
    }
    .card-image-full {
      width: 100%; border-radius: 8px; margin-bottom: 8px;
      display: block; object-fit: contain;
    }
    .card.image-card.expanded .card-summary-wrap { max-height: 70dvh; }

    /* ── Chat modal ───────────────────────────────────────────── */
    .chat-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.45);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      display: flex; flex-direction: column;
      justify-content: flex-end;
      z-index: 500;
    }
    .chat-overlay.hidden { display: none; }

    .chat-sheet {
      background: var(--bg);
      border-radius: 20px 20px 0 0;
      height: 88dvh;
      display: flex; flex-direction: column;
      overflow: hidden;
    }

    .chat-header {
      display: flex; align-items: center;
      padding: 14px 16px 10px;
      background: var(--surface);
      border-bottom: 0.5px solid var(--border);
      gap: 8px; flex-shrink: 0;
    }
    .chat-close {
      width: 30px; height: 30px; border-radius: 50%;
      background: #e5e5ea; border: none;
      font-size: 13px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .chat-title {
      flex: 1; font-size: 15px; font-weight: 600;
      color: var(--text); text-align: center;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .chat-context-badge {
      font-size: 11px; color: var(--muted);
      background: #f2f2f7; border-radius: 10px;
      padding: 2px 8px; flex-shrink: 0;
    }

    .chat-messages {
      flex: 1; overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 14px 14px 8px;
      display: flex; flex-direction: column; gap: 12px;
    }

    .chat-bubble {
      max-width: 82%; padding: 10px 13px;
      border-radius: 18px; font-size: 14px; line-height: 1.5;
      word-wrap: break-word;
    }
    .chat-bubble.user {
      align-self: flex-end;
      background: var(--accent); color: white;
      border-bottom-right-radius: 5px;
    }
    .chat-bubble.assistant {
      align-self: flex-start;
      background: var(--surface); color: var(--text);
      border: 0.5px solid var(--border);
      border-bottom-left-radius: 5px;
    }
    .chat-bubble.thinking {
      align-self: flex-start;
      background: #f2f2f7; color: var(--muted);
      font-style: italic; font-size: 13px;
    }
    .chat-save-btn {
      display: block; margin-top: 6px;
      font-size: 12px; color: #007aff;
      background: none; border: none;
      cursor: pointer; padding: 0;
      font-family: var(--font);
    }
    .chat-save-btn:active { opacity: 0.6; }

    .chat-input-area {
      background: var(--surface);
      border-top: 0.5px solid var(--border);
      padding: 10px 12px calc(var(--safe-bottom) + 10px);
      display: flex; align-items: flex-end; gap: 8px;
      flex-shrink: 0;
    }
    .chat-input {
      flex: 1; padding: 10px 14px;
      font-size: 15px; font-family: var(--font);
      background: #f2f2f7; border: none; border-radius: 20px;
      outline: none; color: var(--text);
      resize: none; max-height: 120px;
    }
    .chat-send-btn {
      width: 36px; height: 36px; border-radius: 50%;
      background: var(--accent); border: none;
      color: white; font-size: 18px; line-height: 1;
      cursor: pointer; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .chat-send-btn:disabled { background: #c7c7cc; }
    .chat-voice-btn {
      width: 36px; height: 36px; border-radius: 50%;
      background: #f2f2f7; border: 0.5px solid var(--border);
      font-size: 14px; cursor: pointer; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .chat-voice-btn.listening { background: var(--accent); color: white; }

    /* ── API Key modal ────────────────────────────────────────── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.45);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      display: flex;
      align-items: flex-end;
      justify-content: center;
      z-index: 400;
      padding-bottom: var(--safe-bottom);
    }
    .modal-overlay.hidden { display: none; }

    .modal-sheet {
      background: var(--surface);
      border-radius: 20px 20px 0 0;
      padding: 24px 24px calc(24px + var(--safe-bottom));
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .modal-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
      text-align: center;
    }

    .modal-desc {
      font-size: 14px;
      color: var(--muted);
      text-align: center;
      line-height: 1.5;
    }

    .modal-desc a { color: var(--accent); text-decoration: none; }

    .modal-input {
      width: 100%;
      padding: 12px 14px;
      font-size: 14px;
      font-family: monospace;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--bg);
      color: var(--text);
      outline: none;
    }
    .modal-input:focus { border-color: var(--accent); }

    .modal-save {
      width: 100%;
      padding: 14px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      font-family: var(--font);
      cursor: pointer;
    }
    .modal-save:active { background: var(--accent-dark); }

    /* ── Toast ────────────────────────────────────────────────── */
    .toast {
      position: fixed;
      bottom: calc(var(--safe-bottom) + 108px);
      left: 50%;
      transform: translateX(-50%) translateY(10px);
      background: rgba(28,28,30,0.88);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      color: white;
      font-size: 13px;
      padding: 8px 16px;
      border-radius: 20px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.18s, transform 0.18s;
      white-space: nowrap;
      z-index: 300;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<div class="app">

  <!-- Nav bar -->
  <div class="nav-bar">
    <button class="back-btn" id="backBtn">‹ Back</button>
    <div class="nav-title" id="navTitle">Home</div>
    <div class="menu-wrap">
      <button class="menu-btn" id="menuBtn">···</button>
      <div class="menu-dropdown" id="menuDropdown">
        <button class="menu-item" id="miCluster">⚡ Auto-cluster</button>
        <button class="menu-item" id="miSelect">⊙ Select to merge</button>
        <button class="menu-item" id="miImport">Import JSON</button>
        <button class="menu-item" id="miExport">Export JSON</button>
        <button class="menu-item" id="miCopy">Copy JSON</button>
        <button class="menu-item" id="miRename">Rename session</button>
        <button class="menu-item" id="miApiKey">API Key</button>
        <button class="menu-item danger" id="miClear">Clear all</button>
      </div>
    </div>
  </div>

  <!-- Card list -->
  <div class="card-scroll">
    <div id="cardList"></div>
    <div class="empty-state" id="emptyState" style="display:none">
      <div class="empty-icon">💭</div>
      <div class="empty-text">No ideas here yet</div>
      <div class="empty-hint">Tap the red button and start speaking</div>
    </div>
  </div>

  <!-- Merge bar -->
  <div class="merge-bar" id="mergeBar">
    <span id="mergeCount">0 selected</span>
    <button id="mergeDoBtn">Merge</button>
    <button id="mergeCancelBtn">Cancel</button>
  </div>

  <!-- Record bar -->
  <div class="record-bar">
    <div class="live-text" id="liveText"></div>
    <div class="record-row">
      <button class="stop-btn" id="stopBtn" disabled>■</button>
      <button class="record-btn" id="recordBtn">⏺</button>
      <button class="camera-btn" id="cameraBtn">📷</button>
    </div>

</div>

<div class="chat-overlay hidden" id="chatModal">
  <div class="chat-sheet">
    <div class="chat-header">
      <button class="chat-close" id="chatClose">✕</button>
      <div class="chat-title" id="chatTitle">Explore idea</div>
      <div class="chat-context-badge" id="chatBadge">AI Chat</div>

<!-- API Key modal -->
<div class="modal-overlay hidden" id="keyModal">
  <div class="modal-sheet">
    <div class="modal-title">Connect to Claude</div>
    <div class="modal-desc">
      Paste your Anthropic API key below. It's stored only on this device — never in the code.<br><br>
      Get a key at <a href="https://console.anthropic.com" target="_blank">console.anthropic.com</a>
    </div>

           placeholder="sk-ant-api03-..." autocomplete="off" autocorrect="off" spellcheck="false" />

    <button class="modal-save" id="keyTest" style="background:#6b7280">Test key</button>
