</div>

<div class="toast" id="toast"></div>
<input type="file" id="fileInput"  accept=".json"       style="display:none" />
<input type="file" id="imageInput" accept="image/*"
       style="opacity:0;position:absolute;width:1px;height:1px;pointer-events:none" />

<script>
'use strict';

// ─── CONSTANTS ──────────────────────────────────────────────────────────────
const CLAUDE_MODEL   = 'claude-haiku-4-5-20251001';
const API_KEY_STORE  = 'voicemap_api_key';
const SESSION_STORE  = 'voicemap_session';

const R = { CHILD: 'child', SIBLING: 'sibling', ROOT: 'root' };

// ─── INDEXEDDB ───────────────────────────────────────────────────────────────
const DB_NAME    = 'VoiceMapDB';
const DB_VERSION = 1;
let db = null;

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = e => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains('sessions')) d.createObjectStore('sessions');
      if (!d.objectStoreNames.contains('images'))   d.createObjectStore('images');
    };
    req.onsuccess = e => { db = e.target.result; resolve(db); };
    req.onerror   = e => reject(e.target.error);
  });
}

function saveSessionToDB() {
  if (!db) return;
  try {
    const tx = db.transaction('sessions', 'readwrite');
    tx.objectStore('sessions').put(JSON.parse(JSON.stringify(session)), 'current');
  } catch {}
}

function loadSessionFromDB() {
  if (!db) return Promise.resolve(null);
  return new Promise(resolve => {
    try {
      const req = db.transaction('sessions', 'readonly').objectStore('sessions').get('current');
      req.onsuccess = e => {
        const s = e.target.result;
        resolve(s && Array.isArray(s.nodes) ? s : null);
      };
      req.onerror = () => resolve(null);
    } catch { resolve(null); }
  });
}

async function saveImageToDB(nodeId, dataUrl) {
  imageCache[nodeId] = dataUrl;
  if (!db) return;
  try {
    db.transaction('images', 'readwrite').objectStore('images').put(dataUrl, nodeId);
  } catch {}
}

function deleteImageFromDB(nodeId) {
  delete imageCache[nodeId];
  if (!db) return;
  try {
    db.transaction('images', 'readwrite').objectStore('images').delete(nodeId);
  } catch {}
}

function loadImagesFromDB() {
  if (!db) return Promise.resolve();
  return new Promise(resolve => {
    try {
      const req = db.transaction('images', 'readonly').objectStore('images').openCursor();
      req.onsuccess = e => {
        const cursor = e.target.result;
        if (cursor) { imageCache[cursor.key] = cursor.value; cursor.continue(); }
        else resolve();
      };
      req.onerror = () => resolve();
    } catch { resolve(); }
  });
}

// ─── PERSISTENCE ─────────────────────────────────────────────────────────────
function saveSession() {
  // Sync localStorage backup (text only, no images)
  try { localStorage.setItem(SESSION_STORE, JSON.stringify(session)); } catch {}
  // Async IndexedDB save (fire and forget)
  saveSessionToDB();
}

function loadSavedSessionSync() {
  try {
    const raw = localStorage.getItem(SESSION_STORE);
    if (raw) { const s = JSON.parse(raw); if (Array.isArray(s.nodes)) return s; }
  } catch {}
  return null;
}

// ─── STATE ──────────────────────────────────────────────────────────────────
let session = loadSavedSessionSync() || {
  session: 'Untitled brainstorm',
  date:    new Date().toISOString(),
  nodes:   [],
  meta:    { tool: 'VoiceMap', version: '0.3' }
};

const imageCache = {}; // nodeId → data URL, populated from IndexedDB on init

let navStack    = [{ id: null, label: 'Home' }];
let expandedIds = new Set();
let selectMode  = false;
let selectedIds = new Set();
let recognition = null;
let isRecording = false;

// ─── HELPERS ────────────────────────────────────────────────────────────────
const currentCtx      = ()   => navStack[navStack.length - 1];
const currentParentId = ()   => currentCtx().id;
const childrenOf      = (id) => session.nodes.filter(n => n.parent_id === id);
const esc = str =>
  String(str ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._t);
  t._t = setTimeout(() => t.classList.remove('show'), 2600);
}

// ─── API KEY MANAGEMENT ──────────────────────────────────────────────────────
function getApiKey() {
  return localStorage.getItem(API_KEY_STORE) || '';
}

function showKeyModal() {
  closeMenu();
  const modal = document.getElementById('keyModal');
  const input = document.getElementById('keyInput');
  const existing = getApiKey();
  input.value = existing ? existing.slice(0, 10) + '...' : '';
  modal.classList.remove('hidden');
  setTimeout(() => input.focus(), 100);
}

function hideKeyModal() {
  document.getElementById('keyModal').classList.add('hidden');
  document.getElementById('keyTestResult').textContent = '';
}

async function testApiKey() {
  const out = document.getElementById('keyTestResult');
  let val = document.getElementById('keyInput').value
    .replace(/[\u2018\u2019\u201C\u201D]/g, '')
    .replace(/[^\x20-\x7E]/g, '')
    .trim();
  if (!val || val.endsWith('...')) val = getApiKey();
  if (!val) { out.textContent = 'No key to test'; return; }
  out.textContent = 'Fetching available models…';
  try {
    const res = await fetch('https://api.anthropic.com/v1/models', {
      method: 'GET',
      headers: {
        'x-api-key':                                 val,
        'anthropic-version':                         '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true',
      }
    });
    const text = await res.text();
    out.textContent = `HTTP ${res.status}:\n${text}`;
  } catch (e) {
    out.textContent = 'Network error: ' + e.message;
  }
}

function saveApiKey() {
  // Strip ALL whitespace, smart quotes, and non-ASCII characters iPhone might add
  let val = document.getElementById('keyInput').value
    .replace(/[\u2018\u2019\u201C\u201D]/g, '') // smart quotes
    .replace(/[^\x20-\x7E]/g, '')               // non-ASCII
    .trim();
  // If user didn't type a new key (still showing masked existing), keep current
  if (!val || val.endsWith('...')) { hideKeyModal(); return; }
  if (!val.startsWith('sk-')) {
    showToast('Key should start with sk-ant-…');
    return;
  }
  localStorage.setItem(API_KEY_STORE, val);
  hideKeyModal();
  showToast(`API key saved (${val.length} chars)`);
}

// ─── NAV ────────────────────────────────────────────────────────────────────
function updateNavBar() {
  const ctx = currentCtx();
  document.getElementById('backBtn').classList.toggle('visible', navStack.length > 1);
  document.getElementById('navTitle').textContent = ctx.label;
}

function navigateInto(nodeId, label) {
  navStack.push({ id: nodeId, label });
  expandedIds.clear();
  renderCards('forward');
  updateNavBar();
}

function navigateBack() {
  if (navStack.length <= 1) return;
  navStack.pop();
  expandedIds.clear();
  renderCards('back');
  updateNavBar();
}

// ─── RENDER ─────────────────────────────────────────────────────────────────
function getDescendants(nodeId) {
  const result = new Set();
  const queue = [nodeId];
  while (queue.length) {
    const id = queue.shift();
    session.nodes.filter(n => n.parent_id === id).forEach(n => {
      result.add(n.id);
      queue.push(n.id);
    });
  }
  return result;
}

async function refileNode(nodeId) {
  const node = session.nodes.find(n => n.id === nodeId);
  if (!node) return;

  const descendants = getDescendants(nodeId);
  const candidates  = session.nodes.filter(n => n.id !== nodeId && !descendants.has(n.id));

  if (candidates.length === 0) { showToast('No other cards to file under'); return; }

  // Mark button as filing
  const btn = document.querySelector(`[data-refile-id="${nodeId}"]`);
  if (btn) { btn.textContent = '⏳ Finding best match…'; btn.classList.add('filing'); btn.disabled = true; }
  setStatus('Finding best match…', 'thinking');

  const candidateList = candidates
    .map(n => `id:"${n.id}" | "${n.label}" — ${(n.summary || n.transcript || '').slice(0, 300)}`)
    .join('\n');

  const userMsg = `Card to re-file:\nLabel: "${node.label}"\nSummary: "${(node.summary || node.transcript || '').slice(0, 500)}"\n\nCandidate parents:\n${candidateList}\n\nReturn JSON: {"parent_id":"<id or null for top level>","parent_label":"<label or Top Level>"}`;
  const sys = 'You organize a mind map. Choose the single best parent for the card from the candidates, or null for top level. Return ONLY valid JSON.';

  try {
    const raw    = await callClaude(userMsg, sys, '{');
    const parsed = extractJSON(raw);
    if (!parsed) throw new Error('Could not parse Claude response');

    const newParentId = parsed.parent_id || null;
    const parentLabel = parsed.parent_label || 'Top Level';

    const n = session.nodes.find(n => n.id === nodeId);
    if (n) { n.parent_id = newParentId; n.last_modified = new Date().toISOString(); }

    renderCards();
    showToast(`Moved to: ${parentLabel}`);
    setStatus('Tap ⏺ to capture an idea');
  } catch (err) {
    if (btn) { btn.textContent = '↗ Re-file with AI'; btn.classList.remove('filing'); btn.disabled = false; }
    setStatus('⚠ ' + err.message, 'error');
  }
}

// ─── DELETE ──────────────────────────────────────────────────────────────────
function deleteNode(nodeId) {
  const node = session.nodes.find(n => n.id === nodeId);
  if (!node) return;
  const descCount = getDescendants(nodeId).size;
  const msg = descCount
    ? `Delete "${node.label}" and its ${descCount} sub-card${descCount !== 1 ? 's' : ''}?`
    : `Delete "${node.label}"?`;
  if (!confirm(msg)) return;
  const toRemove = getDescendants(nodeId);
  toRemove.add(nodeId);
  toRemove.forEach(id => { if (imageCache[id]) deleteImageFromDB(id); });
  session.nodes = session.nodes.filter(n => !toRemove.has(n.id));
  renderCards();
  showToast('Card deleted');
}

// ─── SELECT / MERGE ──────────────────────────────────────────────────────────
function enterSelectMode() {
  selectMode = true; selectedIds.clear();
  document.getElementById('mergeBar').classList.add('visible');
  document.getElementById('mergeCount').textContent = '0 selected';
  document.getElementById('miSelect').textContent = '⊙ Exit select mode';
  renderCards();
}

function exitSelectMode() {
  selectMode = false; selectedIds.clear();
  document.getElementById('mergeBar').classList.remove('visible');
  document.getElementById('miSelect').textContent = '⊙ Select to merge';
  renderCards();
}

function toggleSelect(nodeId) {
  selectedIds.has(nodeId) ? selectedIds.delete(nodeId) : selectedIds.add(nodeId);
  document.getElementById('mergeCount').textContent = `${selectedIds.size} selected`;
  const card = document.getElementById('card-' + nodeId);
  if (card) {
    card.classList.toggle('selected', selectedIds.has(nodeId));
    card.querySelector('.select-indicator').textContent = selectedIds.has(nodeId) ? '✓' : '';
  }
}

async function mergeSelected() {
  if (selectedIds.size < 2) { showToast('Select at least 2 cards'); return; }
  const ids   = [...selectedIds];
  const nodes = ids.map(id => session.nodes.find(n => n.id === id)).filter(Boolean);

  document.getElementById('mergeDoBtn').textContent = '⏳ Merging…';
  setStatus('Merging cards…', 'thinking');

  const cardList = nodes.map(n => `Label: "${n.label}"\nSummary: "${n.summary || n.transcript || ''}"`).join('\n\n');
  const userMsg  = `Merge these ${nodes.length} cards into one:\n\n${cardList}\n\nReturn JSON: {"label":"2-5 word title","summary":"1-2 sentence combined summary"}`;
  const sys      = 'You merge mind map cards. Create a single concise card combining all ideas. Return ONLY valid JSON.';

  try {
    const raw    = await callClaude(userMsg, sys, '{');
    const parsed = extractJSON(raw);
    if (!parsed?.label) throw new Error('Bad response from Claude');

    // Collect all children from merged cards
    const now = new Date().toISOString();
    const parentId = nodes[0].parent_id;
    const newId    = makeId();

    session.nodes.push({
      id: newId, label: parsed.label, summary: parsed.summary || '',
      transcript: nodes.map(n => n.transcript).filter(Boolean).join(' | '),
      parent_id: parentId, status: 'untouched', created: now, last_modified: now
    });

    // Re-parent children of merged cards to the new card
    session.nodes.forEach(n => {
      if (ids.includes(n.parent_id)) n.parent_id = newId;
    });

    // Remove the original merged cards
    session.nodes = session.nodes.filter(n => !ids.includes(n.id));

    exitSelectMode();
    renderCards();
    showToast(`Merged into: ${parsed.label}`);
    setStatus('Tap ⏺ to capture an idea');
  } catch (err) {
    document.getElementById('mergeDoBtn').textContent = 'Merge';
    setStatus('⚠ ' + err.message, 'error');
  }
}

// ─── AUTO-CLUSTER ─────────────────────────────────────────────────────────────
async function autoCluster() {
  const cards = childrenOf(currentParentId());
  if (cards.length < 3) { showToast('Need at least 3 cards to cluster'); return; }

  setStatus('Clustering cards…', 'thinking');
  closeMenu();

  const cardList = cards.map(n =>
    `id:"${n.id}" | "${n.label}" — ${(n.summary || n.transcript || '').slice(0, 200)}`
  ).join('\n');

  const userMsg = `Group these cards into logical clusters:\n\n${cardList}\n\nReturn JSON array: [{"groupLabel":"2-4 word group name","cardIds":["id1","id2"]}]. Only create groups with 2+ cards. Ungrouped cards can be omitted.`;
  const sys     = 'You organize mind map cards into meaningful groups. Return ONLY a valid JSON array of groups.';

  try {
    const raw = await callClaude(userMsg, sys, '[');
    let parsed;
    try { parsed = JSON.parse(raw.trim()); } catch {}
    if (!parsed) {
      const s = raw.indexOf('['), e = raw.lastIndexOf(']');
      if (s !== -1 && e > s) try { parsed = JSON.parse(raw.slice(s, e + 1)); } catch {}
    }
    if (!Array.isArray(parsed) || parsed.length === 0) throw new Error('No clusters returned');

    const now = new Date().toISOString();
    let moved = 0;

    parsed.forEach(group => {
      if (!group.groupLabel || !Array.isArray(group.cardIds) || group.cardIds.length < 2) return;
      const groupId = makeId();
      session.nodes.push({
        id: groupId, label: group.groupLabel, summary: '',
        transcript: '', parent_id: currentParentId(),
        status: 'untouched', created: now, last_modified: now
      });
      group.cardIds.forEach(cid => {
        const n = session.nodes.find(n => n.id === cid);
        if (n) { n.parent_id = groupId; moved++; }
      });
    });

    renderCards();
    showToast(`Clustered into ${parsed.length} groups`);
    setStatus('Tap ⏺ to capture an idea');
  } catch (err) {
    setStatus('⚠ ' + err.message, 'error');
  }
}

async function simplifyNode(nodeId) {
  const node = session.nodes.find(n => n.id === nodeId);
  if (!node) return;

  const descIds = getDescendants(nodeId);
  if (descIds.size === 0) { showToast('No child cards to simplify'); return; }

  const btn = document.querySelector(`[data-simplify-id="${nodeId}"]`);
  if (btn) { btn.textContent = '⏳ Simplifying…'; btn.classList.add('working'); btn.disabled = true; }
  setStatus('Simplifying structure…', 'thinking');

  // Build nested tree for Claude
  function buildTree(pid) {
    return session.nodes
      .filter(n => n.parent_id === pid)
      .map(n => ({ label: n.label, summary: n.summary || n.transcript || '', children: buildTree(n.id) }));
  }

  const tree = buildTree(nodeId);
  const userMsg = `Parent card: "${node.label}"\n\nCurrent children:\n${JSON.stringify(tree, null, 2)}\n\nReturn a simplified JSON array of child nodes.`;
  const sys = `You simplify mind map structures. Merge overlapping ideas, remove redundancies, flatten excessive nesting, keep all distinct concepts. Return ONLY a valid JSON array: [{"label":"2-5 word title","summary":"1-2 sentence summary","children":[{"label":"...","summary":"...","children":[]}]}]. Max 2 levels deep.`;

  try {
    const raw = await callClaude(userMsg, sys, '[');
    let parsed;
    try { parsed = JSON.parse(raw.trim()); } catch {}
    if (!parsed) {
      const s = raw.indexOf('['), e = raw.lastIndexOf(']');
      if (s !== -1 && e > s) try { parsed = JSON.parse(raw.slice(s, e + 1)); } catch {}
    }
    if (!Array.isArray(parsed)) throw new Error('Claude returned invalid structure');

    // Remove all old descendants
    session.nodes = session.nodes.filter(n => !descIds.has(n.id));

    // Create new nodes from Claude's simplified structure
    const now = new Date().toISOString();
    function createNodes(items, parentId) {
      items.forEach(item => {
        const id = makeId();
        session.nodes.push({
          id, parent_id: parentId, status: 'untouched', created: now, last_modified: now,
          label:    String(item.label   || '').slice(0, 60),
          summary:  String(item.summary || ''),
          transcript: ''
        });
        if (Array.isArray(item.children) && item.children.length) createNodes(item.children, id);
      });
    }
    createNodes(parsed, nodeId);

    renderCards();
    showToast('Structure simplified');
    setStatus('Tap ⏺ to capture an idea');
  } catch (err) {
    if (btn) { btn.textContent = '⚡ Simplify'; btn.classList.remove('working'); btn.disabled = false; }
    setStatus('⚠ ' + err.message, 'error');
  }
}

function renderCards(animDir) {
  saveSession();
  openSwipeNodeId = null;
  swipeState = null;
  const cards = childrenOf(currentParentId());
  const list  = document.getElementById('cardList');
  const empty = document.getElementById('emptyState');

  empty.style.display = cards.length ? 'none' : 'flex';

  list.innerHTML = cards.map(node => {
    const childCount  = childrenOf(node.id).length;
    const isImageCard = node.type === 'image';
    const pip         = 'pip-' + (node.status || 'untouched');
    const summary     = node.summary || node.transcript || '';
    const expanded    = expandedIds.has(node.id);
    const thumb       = isImageCard && imageCache[node.id]
      ? `<img class="card-image-thumb" src="${imageCache[node.id]}" alt="" />`
      : (isImageCard ? `<div class="pip pip-untouched" style="opacity:0.4"></div>` : '');
    const meta        = childCount
      ? `${childCount} idea${childCount !== 1 ? 's' : ''} inside`
      : (isImageCard ? 'Photo' : 'No sub-ideas yet');

    const isSelected  = selectedIds.has(node.id);
    const nid = esc(node.id);
    return `
      <div class="card-swipe-wrap" id="wrap-${nid}">
        <div class="swipe-right-btns">
          <button class="swipe-btn swipe-btn-done" data-swipe-done-id="${nid}">
            <span class="swipe-icon">✓</span><span>Done</span>
          </button>
        </div>
        <div class="swipe-left-btns">
          <button class="swipe-btn swipe-btn-refile" data-swipe-refile-id="${nid}">
            <span class="swipe-icon">↗</span><span>Re-file</span>
          </button>
          <button class="swipe-btn swipe-btn-delete" data-swipe-delete-id="${nid}">
            <span class="swipe-icon">🗑</span><span>Delete</span>
          </button>
        </div>
        <div class="card${expanded ? ' expanded' : ''}${isImageCard ? ' image-card' : ''}${selectMode ? ' selectable' : ''}${isSelected ? ' selected' : ''}"
             id="card-${nid}" data-node-id="${nid}" data-node-label="${esc(node.label)}" data-status="${esc(node.status || 'untouched')}">
          <div class="card-front">
            ${selectMode ? `<div class="select-indicator">${isSelected ? '✓' : ''}</div>` : (isImageCard ? thumb : `<div class="pip ${pip}"></div>`)}
            <div class="card-body">
              <div class="card-title">${esc(node.label)}</div>
              <div class="card-meta">${esc(meta)}</div>
            </div>
            <div class="card-actions">
              ${!selectMode ? `<button class="info-btn" data-toggle-id="${nid}">ⓘ</button>` : ''}
              ${!selectMode ? `<span class="chevron">›</span>` : ''}
            </div>
          </div>
          ${!selectMode ? `
          <div class="card-summary-wrap">
            ${isImageCard && imageCache[node.id] ? `<img class="card-image-full" src="${imageCache[node.id]}" alt="" />` : ''}
            ${summary ? `<div class="card-summary">${esc(summary)}</div>` : ''}
            <div class="card-action-row">
              <button class="refile-btn" data-refile-id="${nid}">↗ Re-file</button>
              ${childCount > 0 ? `<button class="simplify-btn" data-simplify-id="${nid}">⚡ Simplify</button>` : ''}
              <button class="refile-btn" data-explore-id="${nid}" style="background:rgba(0,122,255,0.12);border-color:rgba(0,122,255,0.25);color:#007aff">💬 Explore</button>
            </div>
          </div>` : ''}
        </div>
      </div>`;
  }).join('');

  if (animDir) {
    list.classList.remove('anim-forward', 'anim-back');
    void list.offsetWidth;
    list.classList.add(animDir === 'forward' ? 'anim-forward' : 'anim-back');
  }
}

function toggleSummary(nodeId) {
  const card = document.getElementById('card-' + nodeId);
  if (!card) return;
  const open = expandedIds.has(nodeId);
  open ? expandedIds.delete(nodeId) : expandedIds.add(nodeId);
  card.classList.toggle('expanded', !open);
}

// ─── RECORDING ──────────────────────────────────────────────────────────────
function initRecognition() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    setStatus('Speech recognition not supported — use Safari or Chrome');
    document.getElementById('recordBtn').disabled = true;
    return null;
  }

  const r      = new SR();
  r.continuous     = true;
  r.interimResults = true;
  r.lang           = 'en-US';

  r.onresult = e => {
    let interim = '', final = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      const t = e.results[i][0].transcript;
      e.results[i].isFinal ? (final += t) : (interim += t);
    }
    if (final.trim()) {
      document.getElementById('liveText').textContent = '';
      handleTranscript(final.trim());
    } else {
      document.getElementById('liveText').textContent = interim;
    }
  };

  r.onerror = e => {
    if (e.error === 'no-speech') return;
    const msgs = {
      'audio-capture': '⚠ No mic found — connect one and try again',
      'not-allowed':   '⚠ Mic blocked — allow it in browser settings',
      'network':       '⚠ Network error',
    };
    const msg = msgs[e.error] || 'Mic error: ' + e.error;
    setRecordingState(false);
    setStatus(msg, 'error');
    showToast(msg);
  };

  r.onend = () => { if (isRecording) r.start(); };
  return r;
}

function startRecording() {
  if (!getApiKey()) { showKeyModal(); return; }
  if (!recognition) recognition = initRecognition();
  if (!recognition) return;
  recognition.start();
  setRecordingState(true);
}

function stopRecording() {
  isRecording = false;
  if (recognition) { recognition.stop(); recognition = null; }
  setRecordingState(false);
  document.getElementById('liveText').textContent = '';
}

function setRecordingState(state) {
  isRecording = state;
  const btn = document.getElementById('recordBtn');
  btn.disabled = state;
  btn.classList.toggle('recording', state);
  document.getElementById('stopBtn').disabled = !state;
  setStatus(state ? 'Listening — speak your idea…' : 'Tap ⏺ to capture an idea');
}

function setStatus(msg, cls) {
  const el = document.getElementById('statusText');
  el.textContent = msg;
  el.className   = 'status-text' + (cls ? ' ' + cls : '');
}

// ─── CLAUDE API ─────────────────────────────────────────────────────────────
async function callClaude(userContent, systemPrompt, prefill = '') {
  const apiKey = getApiKey();
  if (!apiKey) throw new Error('No API key — tap ··· → API Key to add one');
  console.log('[VoiceMap] key length:', apiKey.length, 'starts:', apiKey.slice(0, 7));

  const messages = [{ role: 'user', content: userContent }];
  if (prefill) messages.push({ role: 'assistant', content: prefill });

  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type':                              'application/json',
      'x-api-key':                                 apiKey,
      'anthropic-version':                         '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true',
    },
    body: JSON.stringify({
      model:      CLAUDE_MODEL,
      max_tokens: 500,
      system:     systemPrompt,
      messages
    })
  });

  if (!res.ok) {
    const body = await res.text().catch(() => '');
    let msg = `HTTP ${res.status}`;
    try { const j = JSON.parse(body); msg = j.error?.message || j.error?.type || msg; } catch {}
    if (res.status === 401) {
      setStatus('⚠ API key invalid — tap ··· → API Key', 'error');
      throw new Error('API key invalid or revoked');
    }
    throw new Error(`[${res.status}] ${msg}`);
  }
  return prefill + (await res.json()).content[0].text;
}

function extractJSON(raw) {
  try { return JSON.parse(raw.trim()); } catch {}
  const start = raw.indexOf('{');
  const end   = raw.lastIndexOf('}');
  if (start !== -1 && end > start) {
    try { return JSON.parse(raw.slice(start, end + 1)); } catch {}
  }
  return null;
}

async function handleTranscript(transcript) {
  // Capture any pending image before processing (voice description path — no vision API needed)
  const capturedImage = pendingImage;
  if (capturedImage) clearPendingImage();

  setStatus('Claude is thinking…', 'processing');

  const ctx      = currentCtx();
  const siblings = childrenOf(ctx.id);
  const parent   = ctx.id ? session.nodes.find(n => n.id === ctx.id) : null;

  const allCards = session.nodes
    .map(n => `id:"${n.id}" | "${n.label}"${n.summary ? ` — ${n.summary.slice(0, 80)}` : ''}`)
    .join('\n');

  const systemPrompt =
`You distill voice memos into mind map cards. Be extremely concise.

Return JSON with these keys:
  "action"       — "create" (default) or "complete" (if transcript describes finishing an existing task)
  "label"        — 2 to 4 words MAX. Required for action "create".
  "summary"      — 1 to 2 sentences. Required for action "create".
  "relationship" — one of: "${R.CHILD}", "${R.SIBLING}", "${R.ROOT}". Required for action "create".
  "children"     — ONLY for lists. Array of short label strings. OMIT if not a list.
  "match_id"     — Required for action "complete". The id of the matching existing card.

Completion detection: if the transcript uses past tense to describe completing/finishing/doing something that matches an existing card (e.g. "I finished the backyard irrigation", "just completed the budget"), set action to "complete" and match_id to the best matching card id. Only do this when confident of a clear match.

List detection: if the speaker enumerates discrete items, extract each as a child label. Parent label becomes the list topic.

Relationship rules (action "create" only):
  "${R.CHILD}"   → belongs under current context
  "${R.SIBLING}" → parallel idea at same level
  "${R.ROOT}"    → entirely new top-level subject

Default action to "create", relationship to "${R.CHILD}". Good labels: "Backyard irrigation", "Budget constraints", "Weekly meal prep".`;

  const userMsg = [
    `Current context: "${ctx.label}"`,
    parent          ? `Parent: "${parent.label}"` : null,
    siblings.length ? `Siblings: ${siblings.map(s => `"${s.label}"`).join(', ')}` : null,
    allCards        ? `\nAll existing cards:\n${allCards}` : null,
    `\nTranscript: "${transcript}"`
  ].filter(Boolean).join('\n');

  let parsed;
  let claudeError = null;
  try {
    const raw = await callClaude(userMsg, systemPrompt, '{');
    console.log('[VoiceMap] Claude raw response:', raw);
    parsed = extractJSON(raw);
    if (!parsed?.action) throw new Error('Bad JSON from Claude: ' + raw.slice(0, 120));
  } catch (err) {
    claudeError = err.message;
    console.error('[VoiceMap] Claude error:', claudeError);
    parsed = { action: 'create', label: transcript.slice(0, 40), summary: transcript, relationship: R.CHILD };
  }

  // Handle completion action
  if (parsed.action === 'complete' && parsed.match_id) {
    const matchNode = session.nodes.find(n => n.id === parsed.match_id);
    if (matchNode) {
      matchNode.status = 'done';
      matchNode.last_modified = new Date().toISOString();
      renderCards();
      showToast(`✓ Done: ${matchNode.label}`);
      setRecordingState(isRecording);
      return;
    }
  }

  // Default: create new card
  if (!parsed.label) {
    parsed = { action: 'create', label: transcript.slice(0, 40), summary: transcript, relationship: R.CHILD };
  }
  const newNodeId = addNode(parsed, transcript);

  // Attach photo if one was waiting — no vision API needed, voice was the description
  if (capturedImage && newNodeId) {
    const node = session.nodes.find(n => n.id === newNodeId);
    if (node) {
      node.type = 'image';
      await saveImageToDB(newNodeId, capturedImage.dataUrl);
      renderCards();
      saveSession();
    }
  }

  if (claudeError) {
    setStatus('⚠ ' + claudeError, 'error');
  } else {
    setRecordingState(isRecording);
  }
}

// ─── ADD NODE ────────────────────────────────────────────────────────────────
function makeId() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
}

function addNode(parsed, transcript) {
  const now = new Date().toISOString();
  const ctx = currentCtx();

  let parentId = ctx.id;
  if (navStack.length === 1) {
    // At home — respect Claude's relationship choice
    if (parsed.relationship === R.SIBLING || parsed.relationship === R.ROOT) parentId = null;
  }
  // When drilled into any card, always add under the current context

  const nodeId = makeId();

  session.nodes.push({
    id:            nodeId,
    label:         parsed.label   || transcript.slice(0, 50),
    summary:       parsed.summary || transcript,
    transcript,
    parent_id:     parentId,
    status:        'untouched',
    created:       now,
    last_modified: now
  });

  const listItems = Array.isArray(parsed.children) ? parsed.children.filter(Boolean) : [];
  listItems.forEach(childLabel => {
    session.nodes.push({
      id:            makeId(),
      label:         String(childLabel).slice(0, 60),
      summary:       '',
      transcript:    '',
      parent_id:     nodeId,
      status:        'untouched',
      created:       now,
      last_modified: now
    });
  });

  renderCards();

  if (listItems.length) {
    showToast(`Added "${parsed.label}" + ${listItems.length} items`);
  } else {
    showToast(`Added: "${parsed.label || transcript.slice(0, 32)}"`);
  }
  return nodeId;
}

// ─── IMAGE CAPTURE ───────────────────────────────────────────────────────────
let pendingImage = null; // { dataUrl } — set after photo taken, cleared after card created

function compressImage(file, maxDim) {
  return new Promise(resolve => {
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      URL.revokeObjectURL(url);
      let { width, height } = img;
      if (width > maxDim || height > maxDim) {
        if (width > height) { height = Math.round(height * maxDim / width); width = maxDim; }
        else { width = Math.round(width * maxDim / height); height = maxDim; }
      }
      const canvas = document.createElement('canvas');
      canvas.width = width; canvas.height = height;
      canvas.getContext('2d').drawImage(img, 0, 0, width, height);
      resolve(canvas.toDataURL('image/jpeg', 0.80));
    };
    img.onerror = () => { URL.revokeObjectURL(url); resolve(null); };
    img.src = url;
  });
}

async function handleImageCapture(file) {
  if (!file) return;
  if (!getApiKey()) { showKeyModal(); return; }

  setStatus('Processing photo…', 'processing');
  const dataUrl = await compressImage(file, 1024);
  if (!dataUrl) { setStatus('Could not read image', 'error'); return; }

  pendingImage = { dataUrl };
  const btn = document.getElementById('cameraBtn');
  btn.textContent = 'Skip';
  btn.classList.add('has-pending');
  setStatus('Photo ready — tap ⏺ to describe it', 'processing');
  showToast('Photo ready — describe it or tap Skip');
}

function clearPendingImage() {
  pendingImage = null;
  const btn = document.getElementById('cameraBtn');
  btn.textContent = '📷';
  btn.classList.remove('has-pending');
}

async function skipImageDescription() {
  if (!pendingImage) return;
  const { dataUrl } = pendingImage;
  clearPendingImage();
  setStatus('Analyzing photo…', 'processing');

  const nodeId = makeId();
  const now    = new Date().toISOString();
  const node   = {
    id: nodeId, type: 'image', label: 'Photo', summary: '',
    transcript: '', parent_id: currentParentId(),
    status: 'untouched', created: now, last_modified: now
  };
  session.nodes.push(node);
  await saveImageToDB(nodeId, dataUrl);
  renderCards();
  showToast('Analyzing photo…');

  try {
    const base64     = dataUrl.split(',')[1];
    const parentNode = currentParentId() ? session.nodes.find(n => n.id === currentParentId()) : null;
    const contextPrompt = parentNode
      ? `Parent context: "${parentNode.label}"${parentNode.summary ? ` — ${parentNode.summary}` : ''}.\n\nDescribe this image as a child card under that context.`
      : 'Describe this image as a mind map card.';
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type':                              'application/json',
        'x-api-key':                                 getApiKey(),
        'anthropic-version':                         '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true',
      },
      body: JSON.stringify({
        model: CLAUDE_MODEL, max_tokens: 300,
        system: 'You analyze images for a voice brainstorming app. Use the parent context to interpret the image meaningfully — e.g. a photo of a banana under "Grocery list" should yield "Buy bananas", not just "Banana". Return ONLY valid JSON: {"label":"2-4 word title","summary":"1-2 sentence description relevant as a brainstorm card."}',
        messages: [
          { role: 'user', content: [
            { type: 'image', source: { type: 'base64', media_type: 'image/jpeg', data: base64 } },
            { type: 'text',  text: contextPrompt }
          ]},
          { role: 'assistant', content: '{' }
        ]
      })
    });

    if (res.ok) {
      const raw    = '{' + (await res.json()).content[0].text;
      const parsed = extractJSON(raw);
      if (parsed?.label) {
        node.label         = String(parsed.label).slice(0, 60);
        node.summary       = parsed.summary || '';
        node.last_modified = new Date().toISOString();
        renderCards();
        saveSession();
        showToast(`Photo: "${node.label}"`);
      }
    } else {
      const body = await res.text().catch(() => '');
      setStatus(`⚠ Vision error ${res.status}`, 'error');
      console.error('[VoiceMap] Vision API error:', body);
    }
  } catch (err) {
    setStatus('⚠ ' + err.message, 'error');
    console.error('[VoiceMap] Vision error:', err);
  }

  setStatus('Tap ⏺ to capture an idea');
}

// ─── IMPORT / EXPORT ────────────────────────────────────────────────────────
function importJSON(event) {
  const file = event.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);

      if (data.ideas && !data.nodes) {
        data.nodes = data.ideas.map((idea, i) => ({
          id:            'v1-' + i,
          label:         idea.text.slice(0, 60),
          summary:       idea.text,
          transcript:    idea.text,
          parent_id:     null,
          status:        'untouched',
          created:       new Date().toISOString(),
          last_modified: new Date().toISOString()
        }));
        delete data.ideas;
      }

      if (!Array.isArray(data.nodes)) { showToast('Invalid JSON — no nodes found'); return; }

      session = data;
      navStack = [{ id: null, label: data.session || 'Home' }];
      expandedIds.clear();
      updateNavBar();
      renderCards();
      showToast(`Loaded "${data.session}" · ${data.nodes.length} nodes`);
    } catch (err) {
      showToast('JSON error: ' + err.message);
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

function buildExport() {
  const childMap = {};
  session.nodes.forEach(n => {
    childMap[n.id] = childMap[n.id] || [];
    if (n.parent_id) {
      childMap[n.parent_id] = childMap[n.parent_id] || [];
      childMap[n.parent_id].push(n.id);
    }
  });
  return {
    session: session.session,
    date:    new Date().toISOString(),
    nodes:   session.nodes.map(n => ({ ...n, children: childMap[n.id] || [] })),
    meta:    { tool: 'VoiceMap', version: '0.3' }
  };
}

function downloadJSON() {
  if (!session.nodes.length) { showToast('Nothing to export yet'); closeMenu(); return; }
  const name = (session.session || 'brainstorm').replace(/\s+/g, '_').replace(/[^a-zA-Z0-9_-]/g, '');
  const url  = URL.createObjectURL(new Blob([JSON.stringify(buildExport(), null, 2)], { type: 'application/json' }));
  const a    = Object.assign(document.createElement('a'), {
    href:     url,
    download: name + '_' + new Date().toISOString().slice(0, 10) + '.json'
  });
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  closeMenu();
  showToast('Downloaded');
}

function copyJSON() {
  if (!session.nodes.length) { showToast('Nothing to copy yet'); closeMenu(); return; }
  navigator.clipboard.writeText(JSON.stringify(buildExport(), null, 2))
    .then(()  => { closeMenu(); showToast('Copied to clipboard'); })
    .catch(()  => showToast('Copy failed — use Export instead'));
}

function clearAll() {
  if (session.nodes.length && !confirm('Clear everything and start fresh?')) return;
  session.nodes = [];
  navStack      = [{ id: null, label: session.session || 'Home' }];
  expandedIds.clear();
  updateNavBar();
  renderCards();
  closeMenu();
}

function renameSession() {
  const name = prompt('Session name:', session.session);
  if (name?.trim()) {
    session.session = name.trim();
    if (navStack.length === 1) { navStack[0].label = session.session; updateNavBar(); }
    saveSession();
  }
  closeMenu();
}

// ─── SWIPE GESTURES ──────────────────────────────────────────────────────────
let swipeState      = null;
let openSwipeNodeId = null;

function getSwipeCard(nodeId) {
  return document.querySelector(`#wrap-${nodeId} .card`);
}

function snapCard(nodeId, tx, animate = true) {
  const card = getSwipeCard(nodeId);
  if (!card) return;
  if (animate) card.classList.add('swipe-snap');
  card.style.transform = tx === 0 ? '' : `translateX(${tx}px)`;
  if (tx === 0) {
    setTimeout(() => card?.classList.remove('swipe-snap'), 230);
    if (openSwipeNodeId === nodeId) openSwipeNodeId = null;
  }
}

function closeOpenSwipe() {
  if (openSwipeNodeId) { snapCard(openSwipeNodeId, 0); openSwipeNodeId = null; }
}

function initSwipeHandlers() {
  const list = document.getElementById('cardList');

  list.addEventListener('touchstart', e => {
    if (selectMode || dragState?.phase === 'dragging') return;
    const card = e.target.closest('.card');
    if (!card) return;
    const nodeId = card.dataset.nodeId;
    if (!nodeId) return;

    // Tapping a different card closes any open swipe
    if (openSwipeNodeId && openSwipeNodeId !== nodeId) {
      closeOpenSwipe();
      swipeState = null;
      return;
    }

    swipeState = {
      nodeId,
      startX: e.touches[0].clientX,
      startY: e.touches[0].clientY,
      dx: 0,
      dir: null,
    };
  }, { passive: true });

  document.addEventListener('touchmove', e => {
    if (!swipeState || dragState?.phase === 'dragging') return;
    const touch = e.touches[0];
    const dx = touch.clientX - swipeState.startX;
    const dy = touch.clientY - swipeState.startY;

    if (!swipeState.dir) {
      if (Math.abs(dx) < 4 && Math.abs(dy) < 4) return;
      swipeState.dir = Math.abs(dx) > Math.abs(dy) ? 'h' : 'v';
    }
    if (swipeState.dir === 'v') return;

    e.preventDefault();
    swipeState.dx = dx;

    // Left swipe opens two buttons (160px), right swipe opens one (80px)
    const clamped = Math.max(-160, Math.min(80, dx));
    const card = getSwipeCard(swipeState.nodeId);
    if (card) {
      card.classList.remove('swipe-snap');
      card.style.transform = `translateX(${clamped}px)`;
    }
  }, { passive: false });

  document.addEventListener('touchend', () => {
    if (!swipeState || swipeState.dir !== 'h') { swipeState = null; return; }
    const { nodeId, dx } = swipeState;
    swipeState = null;

    const THRESHOLD = 45;
    if (dx < -THRESHOLD) {
      snapCard(nodeId, -160);
      openSwipeNodeId = nodeId;
    } else if (dx > THRESHOLD) {
      snapCard(nodeId, 80);
      openSwipeNodeId = nodeId;
    } else {
      snapCard(nodeId, 0);
    }
  }, { passive: true });
}

// ─── AI CHAT ─────────────────────────────────────────────────────────────────
let chatNodeId      = null;
let chatHistory     = [];
let chatRecognition = null;
let chatListening   = false;

function openChatModal(nodeId) {
  const node = session.nodes.find(n => n.id === nodeId);
  if (!node) return;
  chatNodeId  = nodeId;
  chatHistory = [];

  document.getElementById('chatTitle').textContent   = node.label;
  document.getElementById('chatBadge').textContent   = 'AI Chat';
  document.getElementById('chatMessages').innerHTML  = '';
  document.getElementById('chatInput').value         = '';
  document.getElementById('chatModal').classList.remove('hidden');

  // Seed with a brief context message from Claude
  const ctx    = (node.summary || node.transcript || '').slice(0, 400);
  const seedMsg = ctx
    ? `You're helping explore the idea: **"${node.label}"**\n\nContext: ${ctx}\n\nStart with one insightful question or observation to spark thinking.`
    : `You're helping explore the idea: **"${node.label}"**\n\nStart with one insightful question or observation to spark thinking.`;

  addChatBubble('thinking', '…');
  callChatClaude(seedMsg, true);
  setTimeout(() => document.getElementById('chatInput').focus(), 400);
}

function closeChatModal() {
  document.getElementById('chatModal').classList.add('hidden');
  stopChatVoice();
  chatNodeId  = null;
  chatHistory = [];
}

function addChatBubble(role, text, msgId) {
  const msgs = document.getElementById('chatMessages');

  // Remove thinking indicator if replacing it
  const thinking = msgs.querySelector('.thinking');
  if (thinking) thinking.remove();

  const wrap = document.createElement('div');
  wrap.style.display = 'flex';
  wrap.style.flexDirection = 'column';
  wrap.style.alignItems = role === 'user' ? 'flex-end' : 'flex-start';

  const bubble = document.createElement('div');
  bubble.className = `chat-bubble ${role}`;
  bubble.textContent = text;
  if (msgId) bubble.dataset.msgId = msgId;
  wrap.appendChild(bubble);

  if (role === 'assistant' && msgId) {
    const saveBtn = document.createElement('button');
    saveBtn.className  = 'chat-save-btn';
    saveBtn.textContent = '➕ Save as card';
    saveBtn.dataset.saveMsgId = msgId;
    wrap.appendChild(saveBtn);
  }

  msgs.appendChild(wrap);
  msgs.scrollTop = msgs.scrollHeight;
}

async function callChatClaude(userText, isSystem = false) {
  const node = session.nodes.find(n => n.id === chatNodeId);
  const systemPrompt = `You are a focused thinking partner helping explore a single idea from a voice brainstorming app. The idea is: "${node?.label || ''}". Context: ${(node?.summary || node?.transcript || '').slice(0, 300)}. Be concise (2-4 sentences), thought-provoking, and practical. When given a follow-up, build on the conversation naturally.`;

  if (!isSystem) {
    chatHistory.push({ role: 'user', content: userText });
  }

  const messages = isSystem
    ? [{ role: 'user', content: userText }]
    : [...chatHistory];

  try {
    const apiKey = getApiKey();
    if (!apiKey) throw new Error('No API key');

    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type':                              'application/json',
        'x-api-key':                                 apiKey,
        'anthropic-version':                         '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true',
      },
      body: JSON.stringify({ model: CLAUDE_MODEL, max_tokens: 400, system: systemPrompt, messages })
    });

    if (!res.ok) {
      const body = await res.text().catch(() => '');
      throw new Error(`API error ${res.status}: ${body.slice(0, 80)}`);
    }

    const text = (await res.json()).content[0].text.trim();
    const msgId = makeId();
    chatHistory.push({ role: 'assistant', content: text });
    addChatBubble('assistant', text, msgId);
  } catch (err) {
    addChatBubble('assistant', '⚠ ' + err.message);
  }
}

function sendChatMessage() {
  const input = document.getElementById('chatInput');
  const text  = input.value.trim();
  if (!text) return;
  input.value = '';
  addChatBubble('user', text);
  addChatBubble('thinking', 'Thinking…');
  callChatClaude(text);
}

function saveChatMessageAsCard(msgId) {
  const bubble = document.querySelector(`[data-msg-id="${msgId}"]`);
  if (!bubble || !chatNodeId) return;
  const text  = bubble.textContent;
  const now   = new Date().toISOString();
  const label = text.split(/[.!?]/)[0].trim().split(' ').slice(0, 5).join(' ');
  session.nodes.push({
    id: makeId(), label: label.slice(0, 60), summary: text,
    transcript: '', parent_id: chatNodeId,
    status: 'untouched', created: now, last_modified: now
  });
  saveSession();
  showToast('Saved as child card');
  // Mark button as saved
  const btn = document.querySelector(`[data-save-msg-id="${msgId}"]`);
  if (btn) { btn.textContent = '✓ Saved'; btn.disabled = true; }
}

function startChatVoice() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { showToast('Voice not supported here'); return; }
  if (chatListening) { stopChatVoice(); return; }

  chatRecognition = new SR();
  chatRecognition.continuous     = false;
  chatRecognition.interimResults = false;
  chatRecognition.lang           = 'en-US';

  chatRecognition.onresult = e => {
    const text = e.results[0][0].transcript.trim();
    if (text) {
      document.getElementById('chatInput').value = text;
      sendChatMessage();
    }
  };
  chatRecognition.onend = () => { chatListening = false; updateChatVoiceBtn(); };
  chatRecognition.onerror = () => { chatListening = false; updateChatVoiceBtn(); };

  chatRecognition.start();
  chatListening = true;
  updateChatVoiceBtn();
}

function stopChatVoice() {
  if (chatRecognition) { chatRecognition.stop(); chatRecognition = null; }
  chatListening = false;
  updateChatVoiceBtn();
}

function updateChatVoiceBtn() {
  const btn = document.getElementById('chatVoiceBtn');
  if (!btn) return;
  btn.classList.toggle('listening', chatListening);
  btn.textContent = chatListening ? '■' : '⏺';
}

// ─── DRAG TO REORDER / REPARENT ──────────────────────────────────────────────
let dragState         = null;
let dragLongPressTimer = null;
const DRAG_LONG_PRESS  = 480;

function initDragHandlers() {
  document.getElementById('cardList').addEventListener('touchstart', onDragTouchStart, { passive: true });
  document.addEventListener('touchmove',   onDragTouchMove,   { passive: false });
  document.addEventListener('touchend',    onDragTouchEnd,    { passive: true });
  document.addEventListener('touchcancel', onDragCancel,      { passive: true });
}

function onDragTouchStart(e) {
  if (selectMode) return;
  // Ignore taps on action buttons
  if (e.target.closest('.swipe-btn,.info-btn,.refile-btn,.simplify-btn')) return;
  const wrap = e.target.closest('.card-swipe-wrap');
  if (!wrap) return;
  const card = wrap.querySelector('.card');
  if (!card) return;
  const nodeId = card.dataset.nodeId;
  if (!nodeId) return;

  const t = e.touches[0];
  dragState = { nodeId, wrap, card, startX: t.clientX, startY: t.clientY, phase: 'pending' };
  dragLongPressTimer = setTimeout(activateDrag, DRAG_LONG_PRESS);
}

function activateDrag() {
  if (!dragState || dragState.phase !== 'pending') return;
  if (navigator.vibrate) navigator.vibrate(12);
  closeOpenSwipe();

  const { card, wrap } = dragState;
  const rect = card.getBoundingClientRect();

  const ghost = document.createElement('div');
  ghost.id = 'drag-ghost';
  ghost.style.top   = rect.top  + 'px';
  ghost.style.left  = rect.left + 'px';
  ghost.style.width = rect.width + 'px';
  ghost.innerHTML   = card.innerHTML;
  document.body.appendChild(ghost);

  wrap.classList.add('drag-source');

  const indicator = document.createElement('div');
  indicator.id = 'drop-indicator';
  document.getElementById('cardList').prepend(indicator);

  dragState = { ...dragState, phase: 'dragging', ghost, indicator,
    offsetY: dragState.startY - rect.top, dropNodeId: null, insertBeforeId: null };
}

function onDragTouchMove(e) {
  if (!dragState) return;
  const t = e.touches[0];

  if (dragState.phase === 'pending') {
    if (Math.abs(t.clientX - dragState.startX) > 10 ||
        Math.abs(t.clientY - dragState.startY) > 10) {
      clearTimeout(dragLongPressTimer);
      dragState = null;
    }
    return;
  }
  if (dragState.phase !== 'dragging') return;
  e.preventDefault();

  const { ghost, indicator, offsetY, nodeId } = dragState;

  ghost.style.top = (t.clientY - offsetY) + 'px';

  ghost.style.visibility = 'hidden';
  const el = document.elementFromPoint(t.clientX, t.clientY);
  ghost.style.visibility = '';

  // Clear live highlights
  document.querySelectorAll('.drop-child-target').forEach(w => w.classList.remove('drop-child-target'));
  indicator.classList.remove('visible');

  const targetWrap = el?.closest('.card-swipe-wrap');
  const targetId   = targetWrap?.querySelector('.card')?.dataset.nodeId;

  if (!targetWrap || targetId === nodeId) return;

  const tRect = targetWrap.getBoundingClientRect();
  const frac  = (t.clientY - tRect.top) / tRect.height;

  if (frac < 0.30) {
    dragState.lastConfirmedDrop = { type: 'before', refId: targetId };
    targetWrap.before(indicator);
    indicator.classList.add('visible');
  } else if (frac > 0.70) {
    dragState.lastConfirmedDrop = { type: 'after', refId: targetId };
    targetWrap.after(indicator);
    indicator.classList.add('visible');
  } else {
    const descendants = getDescendants(nodeId);
    if (!descendants.has(targetId)) {
      dragState.lastConfirmedDrop = { type: 'child', refId: targetId };
      targetWrap.classList.add('drop-child-target');
    }
  }
}

function onDragTouchEnd() {
  clearTimeout(dragLongPressTimer);
  if (!dragState || dragState.phase !== 'dragging') { dragState = null; return; }

  const { nodeId, lastConfirmedDrop, ghost, indicator, wrap } = dragState;
  dragState = null;

  ghost.remove();
  indicator.remove();
  wrap.classList.remove('drag-source');
  document.querySelectorAll('.drop-child-target').forEach(w => w.classList.remove('drop-child-target'));

  const sourceNode = session.nodes.find(n => n.id === nodeId);
  if (!sourceNode || !lastConfirmedDrop) { renderCards(); return; }

  const { type, refId } = lastConfirmedDrop;

  if (type === 'child') {
    sourceNode.parent_id     = refId;
    sourceNode.last_modified = new Date().toISOString();
    renderCards();
    showToast(`Moved inside "${session.nodes.find(n => n.id === refId)?.label}"`);
    saveSession();

  } else if (type === 'before' || type === 'after') {
    const refNode = session.nodes.find(n => n.id === refId);
    if (!refNode) { renderCards(); return; }

    // Move sourceNode to be a sibling of refNode regardless of current parent
    sourceNode.parent_id     = refNode.parent_id;
    sourceNode.last_modified = new Date().toISOString();

    const srcIdx = session.nodes.indexOf(sourceNode);
    session.nodes.splice(srcIdx, 1);
    let tgtIdx = session.nodes.indexOf(refNode);
    if (type === 'after') tgtIdx += 1;
    session.nodes.splice(tgtIdx, 0, sourceNode);
    renderCards();
    saveSession();

  } else {
    renderCards();
  }
}

function onDragCancel() {
  clearTimeout(dragLongPressTimer);
  if (!dragState) return;
  if (dragState.ghost)     { dragState.ghost.remove(); }
  if (dragState.indicator) { dragState.indicator.remove(); }
  if (dragState.wrap)      { dragState.wrap.classList.remove('drag-source'); }
  document.querySelectorAll('.drop-child-target').forEach(w => w.classList.remove('drop-child-target'));
  dragState = null;
}

// ─── MENU ───────────────────────────────────────────────────────────────────
const toggleMenu = () => document.getElementById('menuDropdown').classList.toggle('open');
const closeMenu  = () => document.getElementById('menuDropdown').classList.remove('open');

// ─── INIT ───────────────────────────────────────────────────────────────────
async function initApp() {
  // Show immediately with localStorage data
  updateNavBar();
  renderCards();
  if (!getApiKey()) showKeyModal();

  // Then upgrade from IndexedDB in background
  try {
    await openDB();
    const idbSession = await loadSessionFromDB();
    // Use IndexedDB data if it has more nodes (more up to date)
    if (idbSession && idbSession.nodes?.length >= session.nodes.length) {
      session = idbSession;
    } else if (session.nodes.length > 0) {
      // Migrate localStorage data to IndexedDB
      saveSessionToDB();
    }
    await loadImagesFromDB();
    renderCards(); // Re-render with images loaded
  } catch (e) {
    console.warn('[VoiceMap] IndexedDB unavailable, using localStorage:', e.message);
  }
}

document.addEventListener('DOMContentLoaded', () => {
  initSwipeHandlers();
  initDragHandlers();
  initApp();

  document.getElementById('recordBtn').addEventListener('click', startRecording);
  document.getElementById('stopBtn').addEventListener('click', stopRecording);
  document.getElementById('backBtn').addEventListener('click', navigateBack);
  document.getElementById('cameraBtn').addEventListener('click', () => {
    if (pendingImage) { skipImageDescription(); }
    else { document.getElementById('imageInput').click(); }
  });
  document.getElementById('imageInput').addEventListener('change', e => {
    const file = e.target.files[0];
    e.target.value = '';
    if (file) handleImageCapture(file);
  });

  document.getElementById('menuBtn').addEventListener('click', e => { e.stopPropagation(); toggleMenu(); });
  document.getElementById('miCluster').addEventListener('click', () => { closeMenu(); autoCluster(); });
  document.getElementById('miSelect').addEventListener('click',  () => { closeMenu(); selectMode ? exitSelectMode() : enterSelectMode(); });
  document.getElementById('miImport').addEventListener('click', () => { closeMenu(); document.getElementById('fileInput').click(); });
  document.getElementById('miExport').addEventListener('click', downloadJSON);
  document.getElementById('miCopy').addEventListener('click', copyJSON);
  document.getElementById('miRename').addEventListener('click', renameSession);
  document.getElementById('miApiKey').addEventListener('click', showKeyModal);
  document.getElementById('miClear').addEventListener('click', clearAll);
  document.getElementById('mergeDoBtn').addEventListener('click', mergeSelected);
  document.getElementById('mergeCancelBtn').addEventListener('click', exitSelectMode);
  document.getElementById('fileInput').addEventListener('change', importJSON);

  document.getElementById('chatClose').addEventListener('click', closeChatModal);
  document.getElementById('chatSendBtn').addEventListener('click', sendChatMessage);
  document.getElementById('chatVoiceBtn').addEventListener('click', startChatVoice);
  document.getElementById('chatInput').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendChatMessage(); }
  });
  document.getElementById('chatMessages').addEventListener('click', e => {
    const saveBtn = e.target.closest('[data-save-msg-id]');
    if (saveBtn) saveChatMessageAsCard(saveBtn.dataset.saveMsgId);
  });

  document.getElementById('keySave').addEventListener('click', saveApiKey);
  document.getElementById('keyTest').addEventListener('click', testApiKey);
  document.getElementById('keyInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') saveApiKey();
  });

  document.getElementById('cardList').addEventListener('click', e => {
    const swipeDeleteBtn = e.target.closest('[data-swipe-delete-id]');
    if (swipeDeleteBtn) { e.stopPropagation(); closeOpenSwipe(); deleteNode(swipeDeleteBtn.dataset.swipeDeleteId); return; }

    const swipeRefileBtn = e.target.closest('[data-swipe-refile-id]');
    if (swipeRefileBtn) { e.stopPropagation(); closeOpenSwipe(); refileNode(swipeRefileBtn.dataset.swipeRefileId); return; }

    const swipeDoneBtn = e.target.closest('[data-swipe-done-id]');
    if (swipeDoneBtn) {
      e.stopPropagation();
      const nodeId = swipeDoneBtn.dataset.swipeDoneId;
      const n = session.nodes.find(n => n.id === nodeId);
      if (n) {
        n.status = n.status === 'done' ? 'untouched' : 'done';
        n.last_modified = new Date().toISOString();
        renderCards();
        showToast(n.status === 'done' ? `✓ Done: ${n.label}` : `Reopened: ${n.label}`);
        saveSession();
      }
      return;
    }

    const exploreBtn = e.target.closest('[data-explore-id]');
    if (exploreBtn) { e.stopPropagation(); openChatModal(exploreBtn.dataset.exploreId); return; }

    const refileBtn = e.target.closest('[data-refile-id]');
    if (refileBtn) { e.stopPropagation(); refileNode(refileBtn.dataset.refileId); return; }

    const simplifyBtn = e.target.closest('[data-simplify-id]');
    if (simplifyBtn) { e.stopPropagation(); simplifyNode(simplifyBtn.dataset.simplifyId); return; }

    const infoBtn = e.target.closest('[data-toggle-id]');
    if (infoBtn) { e.stopPropagation(); toggleSummary(infoBtn.dataset.toggleId); return; }

    const front = e.target.closest('.card-front');
    if (front) {
      const card = front.closest('[data-node-id]');
      if (!card) return;
      if (selectMode) { toggleSelect(card.dataset.nodeId); return; }
      navigateInto(card.dataset.nodeId, card.dataset.nodeLabel);
    }
  });

  document.addEventListener('click', e => {
    if (!e.target.closest('.menu-wrap')) closeMenu();
  });
});
</script>
</body>
</html>
